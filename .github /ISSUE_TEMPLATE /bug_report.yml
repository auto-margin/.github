name: "🐛 Bug Report"
description: Report a reproducible problem
title: "[BUG] "
labels: ["bug"]
body:

  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please provide enough detail so we can reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: Clear explanation of the issue
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Error appears
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste logs or attach screenshots
      render: shell

  - type: input
    id: version
    attributes:
      label: App version / commit
      placeholder: e.g. v1.2.0 or commit SHA

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Production
        - Staging
        - Local development
        - CI pipeline
    validations:
      required: true

  - type: textarea
    id: system
    attributes:
      label: System information
      placeholder: |
        OS:
        Browser:
        Node version:
        pnpm version:
