name: Sync issue templates

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - ".github/ISSUE_TEMPLATE/**"
      - "sync.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.name "auto-margin-bot"
          git config --global user.email "bot@users.noreply.github.com"

      - name: Sync templates to target repos
        env:
          GH_TOKEN: ${{ secrets.ORG_SYNC_TOKEN }}
        run: |
          repos=(
            "auto-margin/automargin-assets"
            "auto-margin/automargin-client"
            "auto-margin/automargin-platform"
          )

          for repo in "${repos[@]}"; do
            repo_name=$(basename "$repo")
            branch="sync-issue-templates"

            echo "Processing $repo..."

            rm -rf "$repo_name"
            git clone "https://x-access-token:${GH_TOKEN}@github.com/${repo}.git" "$repo_name"

            mkdir -p "$repo_name/.github/ISSUE_TEMPLATE"
            cp -R .github/ISSUE_TEMPLATE/* "$repo_name/.github/ISSUE_TEMPLATE/"

            cd "$repo_name"

            git checkout -B "$branch"

            git add .github/ISSUE_TEMPLATE

            if git diff --cached --quiet; then
              echo "No changes for $repo"
              cd ..
              continue
            fi

            git commit -m "chore: sync issue templates"
            git push -f origin "$branch"

            gh pr create \
              --repo "$repo" \
              --base main \
              --head "$branch" \
              --title "chore: sync issue templates" \
              --body "This PR syncs the latest issue templates from the organization .github repository." \
              || echo "PR may already exist for $repo"

            cd ..
          done
